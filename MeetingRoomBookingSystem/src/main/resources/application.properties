spring.application.name=MeetingRoomBookingSystem

# ===============================
# MYSQL CONNECTION
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bookMeetingRoom?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# ===============================
# JPA / HIBERNATE AUTO TABLE CREATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQL8Dialect}

server.port=${PORT:8080}

# JWT (override JWT_SECRET in production; minimum 32 characters)
jwt.secret=${JWT_SECRET:meeting-room-booking-local-secret-key-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# CORS (override CORS_ALLOWED_ORIGINS in production)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Initial admin (set these as environment variables outside development)
app.admin.name=${ADMIN_NAME:System Admin}
app.admin.email=${ADMIN_EMAIL:admin@company.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}

# App timezone used for booking availability/status calculations
app.time-zone=${APP_TIME_ZONE:Asia/Kolkata}
